# Builds Founder Research desktop installers for Windows, macOS, and Linux.
#
# How to get installers (no local setup needed):
#   1. Push a tag like v1.0.0  (git tag v1.0.0 && git push origin v1.0.0).
#      A GitHub Release is created automatically with all installers attached
#      — download them from the repo's "Releases" page.
#   2. Or run this workflow manually from the GitHub "Actions" tab
#      (installers appear as artifacts on the run).

name: Desktop installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: "desktop/release/*.exe"
          - os: macos-latest
            target: mac
            artifact: "desktop/release/*.dmg"
          - os: ubuntu-latest
            target: linux
            artifact: |
              desktop/release/*.AppImage
              desktop/release/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        working-directory: desktop
        run: pnpm dist:${{ matrix.target }}
        env:
          # macOS code signing is skipped unless certificates are configured.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: founder-research-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # On tag pushes, gather all installers into one downloadable Release.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers

      - uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
          body: |
            ## Founder Research — download for your computer

            | Your computer | Download this file |
            |---|---|
            | **Windows** | the file ending in `.exe` |
            | **Mac** | the file ending in `.dmg` |
            | **Linux** | the file ending in `.AppImage` (or `.deb`) |

            Double-click the downloaded file to install, open the app, and
            follow the welcome screen (it walks you through the one-time
            setup).

            > Note: the app is not yet code-signed, so Windows/macOS may show
            > a security prompt on first open (Windows: "More info" → "Run
            > anyway"; Mac: right-click the app → "Open").
